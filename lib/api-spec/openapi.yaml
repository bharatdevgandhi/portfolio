openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: writing
    description: Writing/blog operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /writing:
    get:
      operationId: getWriting
      tags: [writing]
      summary: Get recent writing
      description: Returns recent Substack articles
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WritingResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WritingArticle:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        date:
          type: string
        excerpt:
          type: string
      required:
        - title
        - url
        - date
    WritingResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/WritingArticle"
      required:
        - articles
